name: Update equipment status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch public equipment status
        run: node scripts/update-equipment-status.mjs

      - name: Commit status snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bhnano-wechat-entry/equipment-status.json
          if git diff --cached --quiet; then
            echo "No status changes"
          else
            git commit -m "Update equipment status snapshot"
            git push
          fi
