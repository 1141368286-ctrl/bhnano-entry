<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f6b5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="微纳平台">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>北航智能微纳公共创新中心快捷入口</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-soft: #eef5f3;
      --ink: #17212f;
      --muted: #5c6675;
      --line: #d9e1e8;
      --green: #0f6b5f;
      --green-press: #0a4f46;
      --blue: #1f5fa8;
      --amber: #c35d19;
      --shadow: 0 16px 40px rgba(15, 35, 55, .12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: flex;
      justify-content: center;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fbfd 0%, #f4f7f9 48%, #eef3f2 100%);
      padding: max(18px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 54px;
    }

    .logo-wrap {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 20px rgba(28, 45, 70, .08);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .logo-wrap img {
      max-width: 40px;
      max-height: 40px;
      object-fit: contain;
    }

    .title-block {
      min-width: 0;
      flex: 1 1 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 750;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      min-width: 58px;
      padding: 0 10px;
      border: 1px solid rgba(15, 107, 95, .24);
      border-radius: 999px;
      background: rgba(15, 107, 95, .08);
      color: var(--green);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .hero {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .primary-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      min-height: 48px;
      padding: 0 16px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font-size: 16px;
      font-weight: 750;
      text-decoration: none;
      cursor: pointer;
      transition: transform .14s ease, background-color .14s ease, box-shadow .14s ease;
      box-shadow: 0 12px 24px rgba(15, 107, 95, .22);
    }

    .button:active {
      transform: translateY(1px);
      background: var(--green-press);
      box-shadow: 0 6px 16px rgba(15, 107, 95, .18);
    }

    .button.secondary {
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      box-shadow: none;
    }

    .button.secondary:active {
      background: #eef3f7;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 2px 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .tile {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 76px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(25, 44, 66, .07);
    }

    .tile:active {
      background: #eef3f7;
    }

    .tile-icon {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--green);
      flex: 0 0 auto;
    }

    .tile:nth-child(2) .tile-icon,
    .tile:nth-child(5) .tile-icon {
      background: rgba(31, 95, 168, .1);
      color: var(--blue);
    }

    .tile:nth-child(3) .tile-icon,
    .tile:nth-child(6) .tile-icon {
      background: rgba(195, 93, 25, .1);
      color: var(--amber);
    }

    .tile-text {
      min-width: 0;
    }

    .tile-title {
      display: block;
      font-size: 15px;
      font-weight: 750;
      line-height: 1.25;
    }

    .tile-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .media-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .media-row img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      object-fit: cover;
      background: #fff;
    }

    .notice {
      margin-top: 16px;
      padding: 13px 14px;
      border: 1px solid rgba(195, 93, 25, .22);
      border-radius: 8px;
      background: rgba(195, 93, 25, .08);
      color: #5c3420;
      font-size: 12px;
      line-height: 1.6;
    }

    .record-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(15, 107, 95, .18);
      border-radius: 8px;
      background: rgba(15, 107, 95, .07);
    }

    .record-panel[hidden] {
      display: none;
    }

    .record-title {
      display: block;
      color: var(--ink);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.35;
    }

    .record-time {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .text-button {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 5;
      width: min(calc(100% - 36px), 420px);
      padding: 12px 14px;
      border-radius: 8px;
      background: rgba(23, 33, 47, .94);
      color: #fff;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      transition: transform .18s ease, opacity .18s ease;
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    svg {
      display: block;
      width: 20px;
      height: 20px;
    }

    @media (min-width: 760px) {
      body {
        align-items: center;
        padding: 32px;
      }

      .app {
        min-height: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 22px 60px rgba(20, 35, 55, .14);
      }
    }

    @media (max-width: 360px) {
      .quick-grid {
        grid-template-columns: 1fr;
      }

      .hero h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

  <script>
    const HOME_URL = "https://bhnano.buaa.edu.cn/Home/Index?XPath=000";
    const LOGIN_CALLBACK_URL = "http://bhnano.buaa.edu.cn/Account/CasValidateSuccessCallBack";
    const PERSON_CENTER_URL = "https://bhnano.buaa.edu.cn/PersonCenter";
    const LOGIN_RECORD_KEY = "bhnano_h5_login_record";
    const statusEl = document.getElementById("envStatus");
    const heroTextEl = document.getElementById("heroText");
    const toastEl = document.getElementById("toast");
    const ssoBtnEl = document.getElementById("ssoBtn");
    const loginRecordEl = document.getElementById("loginRecord");
    const recordTitleEl = document.getElementById("recordTitle");
    const recordTimeEl = document.getElementById("recordTime");
    const clearRecordBtnEl = document.getElementById("clearRecordBtn");
    const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
    const hasReturnedFromLogin = new URLSearchParams(window.location.search).get("login") === "returned";

    statusEl.textContent = hasReturnedFromLogin ? "已返回" : isWeChat ? "微信内" : "H5";
    if (hasReturnedFromLogin) {
      heroTextEl.textContent = "已回到 H5 控制台。请选择下方业务入口继续操作。";
    }

    function buildReturnUrl() {
      const url = new URL(window.location.href);
      url.searchParams.set("login", "returned");
      url.hash = "";
      return url.toString();
    }

    function buildSsoUrl() {
      const callback = `${LOGIN_CALLBACK_URL}?serviceURL=${encodeURIComponent(buildReturnUrl())}`;
      return `https://sso.buaa.edu.cn/login?service=${encodeURIComponent(callback)}`;
    }

    function centerRoute(path) {
      const target = `${path}?date=${Date.now()}`;
      return `${PERSON_CENTER_URL}?CenterBoxUrl=${encodeURIComponent(target)}`;
    }

    function readLoginRecord() {
      try {
        return JSON.parse(localStorage.getItem(LOGIN_RECORD_KEY) || "{}");
      } catch (error) {
        return {};
      }
    }

    function writeLoginRecord(patch) {
      const record = { ...readLoginRecord(), ...patch };
      localStorage.setItem(LOGIN_RECORD_KEY, JSON.stringify(record));
      renderLoginRecord();
    }

    function formatLocalTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderLoginRecord() {
      const record = readLoginRecord();
      const returnedAt = formatLocalTime(record.lastReturnedAt);
      const clickedAt = formatLocalTime(record.lastLoginClickAt);

      if (!returnedAt && !clickedAt) {
        loginRecordEl.hidden = true;
        return;
      }

      loginRecordEl.hidden = false;
      if (returnedAt) {
        recordTitleEl.textContent = "最近已返回 H5";
        recordTimeEl.textContent = `${returnedAt}，仅为本机记录，不含账号密码`;
      } else {
        recordTitleEl.textContent = "最近点击过登录";
        recordTimeEl.textContent = `${clickedAt}，等待登录后返回 H5`;
      }
    }

    ssoBtnEl.href = buildSsoUrl();
    document.getElementById("sampleBtn").href = centerRoute("/SampleManage/SampleApplyPersonalListIndex");
    document.getElementById("appointmentBtn").href = centerRoute("/Appointment/HistoryIndex");
    document.getElementById("userCenterBtn").href = centerRoute("/Account/Manage");

    if (hasReturnedFromLogin) {
      writeLoginRecord({ lastReturnedAt: Date.now() });
    } else {
      renderLoginRecord();
    }

    ssoBtnEl.addEventListener("click", () => {
      writeLoginRecord({ lastLoginClickAt: Date.now() });
    });

    clearRecordBtnEl.addEventListener("click", () => {
      localStorage.removeItem(LOGIN_RECORD_KEY);
      renderLoginRecord();
      toast("已清除本机登录记录");
    });

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.opacity = "0";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await copyText(HOME_URL);
        toast("已复制原站链接");
      } catch (error) {
        toast("复制失败，请长按按钮或手动复制");
      }
    });
  </script>
</body>
</html>
